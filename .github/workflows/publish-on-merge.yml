# Required repository secret:
#   NPM_TOKEN — npmjs.com automation token for publishing.
#   Generate at https://www.npmjs.com/settings/<user>/tokens with type "Automation".
#   Add via: Settings → Secrets and variables → Actions → New repository secret.
#
# Required repository label (auto-created by sync-claude-docs.yml on first run):
#   auto-merge-ok

name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'statusline.py'
      - 'package.json'
      - 'src/**'
      - 'bin/**'
      - 'dist/**'

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run build

      - name: Bump patch version
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(npm version patch -m "chore: release v%s [skip ci]")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          git push origin main --tags

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # Try to extract that version's section from CHANGELOG.md
          NOTES=$(awk "/^## v${VERSION}/{flag=1; print; next} /^## v[0-9]/{flag=0} flag" CHANGELOG.md || true)
          if [ -z "${NOTES}" ]; then
            # Fallback: previous minor's notes (auto-bump case)
            PREV_MINOR=$(echo "${VERSION}" | awk -F. '{print $1"."$2".0"}')
            NOTES=$(awk "/^## v${PREV_MINOR}/{flag=1; print; next} /^## v[0-9]/{flag=0} flag" CHANGELOG.md || true)
            if [ -n "${NOTES}" ]; then
              NOTES="${NOTES}

(Note: v${VERSION} is an auto-patch bump from v${PREV_MINOR} by publish-on-merge.)"
            fi
          fi
          if [ -z "${NOTES}" ]; then
            NOTES="Release v${VERSION}. See CHANGELOG.md for details."
          fi
          # Create release if not already exists
          if gh release view "v${VERSION}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists, skipping."
          else
            gh release create "v${VERSION}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "v${VERSION}" \
              --notes "${NOTES}" \
              --latest
            echo "Created GitHub Release v${VERSION}"
          fi
