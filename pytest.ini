[pytest]
# Pytest config for the *.test.py Python integration tests under tests/.
# We mirror the .test.ts naming convention used by vitest. Pytest's default
# discovery and import path can't handle dotted module names like
# "statusline_render.test", so we:
#   1. extend python_files so *.test.py is collected, and
#   2. use importlib import mode so the dot in the filename doesn't break
#      module resolution.
python_files = test_*.py *_test.py *.test.py
addopts = --import-mode=importlib
testpaths = tests
